# POTAL — Shopify App Configuration
#
# Shopify CLI로 앱 배포/관리 시 사용되는 설정 파일
# shopify app deploy 명령으로 앱 업데이트

name = "POTAL"
client_id = "" # Shopify Partner Dashboard에서 생성 후 입력

[access_scopes]
scopes = "read_products,read_themes,write_themes,write_script_tags"

[auth]
redirect_urls = [
  "https://www.potal.app/api/shopify/callback"
]

[webhooks]
api_version = "2024-10"

  [webhooks.privacy_compliance]
  customer_data_request_url = "https://www.potal.app/api/shopify/webhooks"
  customer_deletion_url = "https://www.potal.app/api/shopify/webhooks"
  shop_deletion_url = "https://www.potal.app/api/shopify/webhooks"

[app_proxy]
url = "https://www.potal.app/api/v1"
subpath = "potal"
prefix = "apps"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
